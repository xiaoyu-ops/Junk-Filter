services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: junkfilter-db
    environment:
      POSTGRES_USER: ${DB_USER:-junkfilter}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-junkfilter123}
      POSTGRES_DB: ${DB_NAME:-junkfilter}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - junkfilter-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-junkfilter}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: junkfilter-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - junkfilter-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go 后端 (API 网关 + RSS 抓取)
  go-backend:
    build: ./backend-go
    container_name: junkfilter-go
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-junkfilter}
      DB_PASSWORD: ${DB_PASSWORD:-junkfilter123}
      DB_NAME: ${DB_NAME:-junkfilter}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PYTHON_API_URL: http://python-api:8083
      RSS_PROXY_URL: ${RSS_PROXY_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - junkfilter-network
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Python API 服务 (FastAPI - LLM 聊天/评估接口)
  python-api:
    build: ./backend-python
    container_name: junkfilter-api
    command: python api_server.py
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-junkfilter}
      DB_PASSWORD: ${DB_PASSWORD:-junkfilter123}
      DB_NAME: ${DB_NAME:-junkfilter}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL_ID: ${LLM_MODEL_ID}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - junkfilter-network
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Python Stream Consumer (Redis Stream 消费者 - 自动评估)
  python-evaluator:
    build: ./backend-python
    container_name: junkfilter-evaluator
    command: python main.py
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-junkfilter}
      DB_PASSWORD: ${DB_PASSWORD:-junkfilter123}
      DB_NAME: ${DB_NAME:-junkfilter}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL_ID: ${LLM_MODEL_ID}
      WORKER_ID: 1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - junkfilter-network
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:

networks:
  junkfilter-network:
    driver: bridge
