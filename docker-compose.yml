version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: junkfilter-db
    environment:
      POSTGRES_USER: ${DB_USER:-truesignal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-truesignal123}
      POSTGRES_DB: ${DB_NAME:-truesignal}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - junkfilter-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-truesignal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: junkfilter-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_default_password_change_me}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - junkfilter-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_default_password_change_me}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # P0: Python 评估器 - 第 1 个 (消费者 evaluator-1)
  python-evaluator-1:
    build: ./backend-python
    container_name: junkfilter-python-1
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-truesignal}
      DB_PASSWORD: ${DB_PASSWORD:-truesignal123}
      DB_NAME: ${DB_NAME:-truesignal}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_default_password_change_me}@redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL_ID: ${LLM_MODEL_ID}
      WORKER_ID: 1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - junkfilter-network
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # P0: Python 评估器 - 第 2 个 (消费者 evaluator-2)
  python-evaluator-2:
    build: ./backend-python
    container_name: junkfilter-python-2
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-truesignal}
      DB_PASSWORD: ${DB_PASSWORD:-truesignal123}
      DB_NAME: ${DB_NAME:-truesignal}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_default_password_change_me}@redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL_ID: ${LLM_MODEL_ID}
      WORKER_ID: 2
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - junkfilter-network
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # P0: Python 评估器 - 第 3 个 (消费者 evaluator-3)
  python-evaluator-3:
    build: ./backend-python
    container_name: junkfilter-python-3
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-truesignal}
      DB_PASSWORD: ${DB_PASSWORD:-truesignal123}
      DB_NAME: ${DB_NAME:-truesignal}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_default_password_change_me}@redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL_ID: ${LLM_MODEL_ID}
      WORKER_ID: 3
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - junkfilter-network
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:

networks:
  junkfilter-network:
    driver: bridge
