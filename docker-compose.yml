version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: junkfilter-db
    environment:
      POSTGRES_USER: truesignal
      POSTGRES_PASSWORD: truesignal123
      POSTGRES_DB: truesignal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - junkfilter-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truesignal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: junkfilter-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - junkfilter-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # P0: Python 评估器 - 第 1 个 (消费者 evaluator-1)
  python-evaluator-1:
    build: ./backend-python
    container_name: junkfilter-python-1
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: truesignal
      DB_PASSWORD: truesignal123
      DB_NAME: truesignal
      REDIS_URL: redis://redis:6379/0
      WORKER_ID: 1
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - junkfilter-network
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # P0: Python 评估器 - 第 2 个 (消费者 evaluator-2)
  python-evaluator-2:
    build: ./backend-python
    container_name: junkfilter-python-2
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: truesignal
      DB_PASSWORD: truesignal123
      DB_NAME: truesignal
      REDIS_URL: redis://redis:6379/0
      WORKER_ID: 2
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - junkfilter-network
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # P0: Python 评估器 - 第 3 个 (消费者 evaluator-3)
  python-evaluator-3:
    build: ./backend-python
    container_name: junkfilter-python-3
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: truesignal
      DB_PASSWORD: truesignal123
      DB_NAME: truesignal
      REDIS_URL: redis://redis:6379/0
      WORKER_ID: 3
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - junkfilter-network
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:

networks:
  junkfilter-network:
    driver: bridge
